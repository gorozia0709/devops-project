---
- name: Install pip
  apt:
    name: python3-pip
    state: present
    update_cache: yes
  become: yes

- name: Install Python dependencies
  pip:
    requirements: /opt/devops-app/requirements.txt
    executable: pip3

- name: Create app directory
  file:
    path: /opt/devops-app
    state: directory
    mode: '0755'
  become: yes

- name: Create log directory
  file:
    path: /var/log/devops-app
    state: directory
    mode: '0755'
  become: yes