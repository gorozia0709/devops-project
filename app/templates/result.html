<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hello!</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .slot-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
            background: {{ '#2563eb' if slot == 'blue' else '#16a34a' }};
            color: white;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="slot-badge">{{ slot }} slot</span>
        <div class="greeting">👋</div>
        <h1>Hello, {{ name }}!</h1>
        <p class="subtitle">Nice to meet you.</p>
        <a class="back-link" href="/">Go back</a>
    </div>
</body>
</html>
